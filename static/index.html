<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHL Assessment Recommender</title>
  <!-- v2 -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      width: 100%;
      background: #1a1a2e;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: fixed;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: 2px; }
    .logo span { color: #6bcc5a; }
    .tagline { font-size: 13px; color: #aaa; }

    /* New Chat button */
    #new-chat-btn {
      background: #6bcc5a;
      color: #1a1a2e;
      border: none;
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, transform 0.1s;
    }
    #new-chat-btn:hover { background: #5ab84a; transform: scale(1.03); }
    #new-chat-btn svg { width: 14px; height: 14px; }

    /* ── Main layout ── */
    .container {
      margin-top: 58px;
      width: 100%;
      max-width: 840px;
      height: calc(100vh - 58px);
      display: flex;
      flex-direction: column;
      padding: 16px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ── Chat window ── */
    #chat-window {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 12px 4px;
      scroll-behavior: smooth;
    }

    /* ── Messages ── */
    .message { display: flex; gap: 10px; animation: fadeIn 0.2s ease; }
    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .message.assistant .avatar { background: #1a1a2e; color: #6bcc5a; }
    .message.user .avatar { background: #6bcc5a; color: #fff; }

    .bubble {
      max-width: 76%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14.5px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .message.assistant .bubble {
      background: #fff;
      color: #222;
      border-top-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .message.user .bubble {
      background: #1a1a2e;
      color: #fff;
      border-top-right-radius: 4px;
    }

    /* ── Recommendations ── */
    .recs { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
    .rec-card {
      background: #f8f9fa;
      border: 1px solid #e2e5ea;
      border-radius: 8px;
      padding: 8px 12px;
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; color: inherit;
      transition: background 0.12s, border-color 0.12s;
    }
    .rec-card:hover { background: #eef6f0; border-color: #6bcc5a; }
    .rec-badge {
      font-size: 10px; font-weight: 700;
      padding: 2px 6px; border-radius: 5px;
      background: #1a1a2e; color: #6bcc5a;
      letter-spacing: 0.5px; flex-shrink: 0;
    }
    .rec-info { flex: 1; min-width: 0; display: flex; align-items: center; gap: 6px; }
    .rec-name { font-size: 13px; font-weight: 500; }
    .rec-type { font-size: 11px; color: #999; white-space: nowrap; }
    .rec-link { font-size: 11px; color: #6bcc5a; flex-shrink: 0; white-space: nowrap; }

    /* ── Typing indicator ── */
    .typing-indicator {
      display: flex; gap: 4px;
      padding: 14px 16px;
      background: #fff;
      border-radius: 18px; border-top-left-radius: 4px;
      width: fit-content;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .typing-indicator span {
      width: 7px; height: 7px;
      background: #aaa; border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    /* ── System note ── */
    .system-note {
      text-align: center; font-size: 12px; color: #999;
      padding: 4px 0; animation: fadeIn 0.3s ease;
    }
    .system-note a {
      color: #6bcc5a; cursor: pointer;
      text-decoration: underline;
    }

    /* ── Input bar ── */
    .input-bar { padding: 12px 0 4px; display: flex; gap: 10px; }
    #user-input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #dde2e8;
      border-radius: 24px;
      font-size: 14.5px;
      outline: none; resize: none;
      max-height: 120px; line-height: 1.4;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    #user-input:focus { border-color: #6bcc5a; }
    #user-input:disabled { background: #f5f5f5; }
    #send-btn {
      width: 46px; height: 46px;
      border-radius: 50%; border: none;
      background: #1a1a2e; color: #6bcc5a;
      font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s;
    }
    #send-btn:hover { background: #2d2d4e; }
    #send-btn:disabled { opacity: 0.35; cursor: default; }

    /* ── Suggestion chips ── */
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; padding: 6px 0 4px; }
    .chip {
      font-size: 12.5px; padding: 6px 14px;
      background: #fff; border: 1.5px solid #dde2e8;
      border-radius: 20px; cursor: pointer; color: #444;
      transition: all 0.15s;
    }
    .chip:hover { border-color: #6bcc5a; color: #1a1a2e; background: #f0fff4; }

    /* ── Type label map ── */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">SHL<span>.</span></div>
    <div class="tagline">Assessment Recommender</div>
  </div>
  <button id="new-chat-btn" onclick="newChat()" title="Start a new conversation">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    New Chat
  </button>
</header>

<div class="container">
  <div id="chat-window"></div>

  <div class="suggestions" id="suggestions">
    <button class="chip" onclick="fillInput(this)">Hiring a Java developer</button>
    <button class="chip" onclick="fillInput(this)">Senior sales manager assessments</button>
    <button class="chip" onclick="fillInput(this)">Personality tests for leadership</button>
    <button class="chip" onclick="fillInput(this)">Cognitive ability assessments</button>
    <button class="chip" onclick="fillInput(this)">Entry-level customer service</button>
  </div>

  <div class="input-bar">
    <textarea id="user-input" rows="1" placeholder="Describe the role you're hiring for…"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Send (Enter)">➤</button>
  </div>
</div>

<script>
  const chatWindow  = document.getElementById('chat-window');
  const inputEl     = document.getElementById('user-input');
  const sendBtn     = document.getElementById('send-btn');
  const suggestDiv  = document.getElementById('suggestions');

  // Full type label map
  const TYPE_LABELS = {
    A: "Ability & Aptitude",
    B: "Situational Judgement",
    C: "Competencies",
    D: "Development & 360",
    E: "Assessment Exercises",
    K: "Knowledge & Skills",
    M: "Motivational",
    P: "Personality & Behaviour",
    S: "Simulation",
  };

  let history = [];

  // ── Welcome ───────────────────────────────────────────────────
  welcome();

  function welcome() {
    appendMessage('assistant',
      "Hi! I'm the SHL Assessment Recommender.\n\nTell me about the role you're hiring for and I'll suggest the most relevant assessments from the SHL catalog.",
      []
    );
  }

  // ── New Chat ──────────────────────────────────────────────────
  function newChat() {
    history = [];
    chatWindow.innerHTML = '';
    suggestDiv.style.display = 'flex';
    inputEl.disabled = false;
    sendBtn.disabled = false;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    welcome();
    inputEl.focus();
  }

  // ── Auto-grow textarea ────────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function fillInput(btn) {
    inputEl.value = btn.textContent;
    inputEl.focus();
  }

  // ── Send ──────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    suggestDiv.style.display = 'none';
    appendMessage('user', text, []);
    history.push({ role: 'user', content: text });

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    const typingId = showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }

      const data = await res.json();
      removeTyping(typingId);

      appendMessage('assistant', data.reply, data.recommendations || []);
      history.push({ role: 'assistant', content: data.reply });

      if (data.end_of_conversation) {
        setTimeout(() => {
          const note = document.createElement('div');
          note.className = 'system-note';
          note.innerHTML = 'Conversation complete. <a onclick="newChat()">Start a new chat ↺</a>';
          chatWindow.appendChild(note);
          scrollToBottom();
        }, 400);
      }

    } catch (err) {
      removeTyping(typingId);
      appendMessage('assistant', `Something went wrong: ${err.message}`, []);
    }

    sendBtn.disabled = false;
    inputEl.focus();
    scrollToBottom();
  }

  // ── Render helpers ────────────────────────────────────────────
  function appendMessage(role, text, recs) {
    const msg    = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'assistant' ? '◆' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    if (recs && recs.length > 0) {
      const recsEl = document.createElement('div');
      recsEl.className = 'recs';
      recs.forEach(r => {
        const card = document.createElement('a');
        card.className = 'rec-card';
        card.href = r.url;
        card.target = '_blank';
        card.rel = 'noopener noreferrer';

        const typeLabel = TYPE_LABELS[r.test_type] || r.test_type;

        card.innerHTML = `
          <span class="rec-badge">${r.test_type}</span>
          <div class="rec-info">
            <span class="rec-name">${escHtml(r.name)}</span>
            <span class="rec-type">— ${typeLabel}</span>
          </div>
          <span class="rec-link">View ↗</span>
        `;
        recsEl.appendChild(card);
      });
      bubble.appendChild(recsEl);
    }

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatWindow.appendChild(msg);
    scrollToBottom();
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'message assistant';
    const av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = '◆';
    const ind = document.createElement('div');
    ind.className = 'typing-indicator';
    ind.innerHTML = '<span></span><span></span><span></span>';
    const id = 'typing-' + Date.now();
    wrap.id = id;
    wrap.appendChild(av);
    wrap.appendChild(ind);
    chatWindow.appendChild(wrap);
    scrollToBottom();
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function scrollToBottom() {
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
